name: Build & Release Electron

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Esto generará instaladores para los tres sistemas operativos en paralelo
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # Buscamos el lockfile dentro de la carpeta build
          cache-dependency-path: ./src/build/package-lock.json

      - name: Install dependencies
        # Entramos a la carpeta donde está tu package.json para instalar
        run: npm install
        working-directory: ./src/build

      - name: Build & Publish
        # Ejecuta el script "build" de tu package.json y fuerza la subida a GitHub
        run: npm run build -- --publish always
        working-directory: ./src/build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
