name: Build & Release Electron

on:
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ./src/build/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ./src/build

      - name: Build & Publish
        # Usamos --publish always para que intente subirlo a GitHub
        run: npx electron-builder --publish always
        working-directory: ./src/build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
